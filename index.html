<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>食飯分賬計錢神器 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4">
    <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-md overflow-hidden">
        
        <div class="flex border-b bg-gray-50">
            <button onclick="switchTab('calc')" id="tab-calc" class="flex-1 py-3 text-center font-bold text-indigo-600 border-b-2 border-indigo-600">🍽️ 新增計算</button>
            <button onclick="switchTab('history'); loadHistory();" id="tab-history" class="flex-1 py-3 text-center font-bold text-gray-500 hover:text-indigo-600">📊 查看歷史紀錄</button>
        </div>

        <div id="page-calc" class="p-6">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700">開餐主題 / 餐廳名稱</label>
                <input type="text" id="mealTitle" placeholder="例如：Deliveroo 麥當勞" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2">
            </div>
            
            <div class="grid grid-cols-3 gap-4 mb-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 text-red-600">總折扣 / 減價 ($)</label>
                    <input type="number" id="discountFee" value="0" min="0" class="mt-1 block w-full rounded-md border-red-300 shadow-sm border p-2 bg-red-50 text-red-700 font-bold" oninput="calculateExpenses()">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">總運費 ($)</label>
                    <input type="number" id="deliveryFee" value="0" min="0" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2" oninput="calculateExpenses()">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">其他雜費 ($)</label>
                    <input type="number" id="otherFee" value="0" min="0" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2" oninput="calculateExpenses()">
                </div>
            </div>
            
            <hr class="mb-6">
            <div class="mb-6">
                <h2 class="text-md font-semibold mb-3 text-gray-700">👥 成員與餐點原價</h2>
                <div id="membersContainer" class="space-y-3"></div>
                <button onclick="addMemberRow()" class="mt-3 w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 px-4 rounded">➕ 新增成員</button>
            </div>
            
            <div class="mt-6 border-t pt-4">
                <h3 class="font-bold text-gray-700 mb-2">核算明細 (按原價比例分攤)：</h3>
                <div id="calcResults" class="space-y-1 text-sm text-gray-600 mb-4"></div>
                <div class="text-right text-lg font-bold text-gray-800 mb-4">整單最終總計: $<span id="grandTotal">0.0</span></div>
                <button onclick="triggerFinalConfirm()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl shadow">🚀 檢查並確認紀錄 (Final Confirm)</button>
            </div>
        </div>

        <div id="page-history" class="p-6 hidden">
            <h2 class="text-lg font-bold mb-2 text-gray-800">📋 歷史開支明細</h2>
            <p class="text-xs text-gray-500 mb-4">提示：點擊右側的付款狀態按鈕即可切換狀態（需管理員密碼）。</p>
            <div id="historyList" class="space-y-4">
                <p class="text-center text-gray-500">載入中...</p>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyDlIMFUkQy8kpGwVM6bgyKYSk6wAUew42YMxgJL9WSS0EVnVKLbpomF-hrgMG0FizHBw/exec"; 

        let memberCount = 0;
        let calculatedData = [];

        window.onload = function() {
            addMemberRow('Roy'); 
            addMemberRow('Yeki');
            addMemberRow('Kermit'); 
            addMemberRow('Ben');
        };

        function switchTab(tab) {
            if(tab === 'calc') {
                document.getElementById('page-calc').classList.remove('hidden');
                document.getElementById('page-history').classList.add('hidden');
                document.getElementById('tab-calc').className = "flex-1 py-3 text-center font-bold text-indigo-600 border-b-2 border-indigo-600";
                document.getElementById('tab-history').className = "flex-1 py-3 text-center font-bold text-gray-500 hover:text-indigo-600";
            } else {
                document.getElementById('page-calc').classList.add('hidden');
                document.getElementById('page-history').classList.remove('hidden');
                document.getElementById('tab-history').className = "flex-1 py-3 text-center font-bold text-indigo-600 border-b-2 border-indigo-600";
                document.getElementById('tab-calc').className = "flex-1 py-3 text-center font-bold text-gray-500 hover:text-indigo-600";
            }
        }

        function addMemberRow(name = '') {
            memberCount++;
            const container = document.getElementById('membersContainer');
            const row = document.createElement('div');
            row.className = 'flex gap-3 items-center member-row';
            row.id = `row-${memberCount}`;
            row.innerHTML = `
                <input type="text" placeholder="名字" value="${name}" class="member-name flex-1 rounded-md border-gray-300 border p-2" oninput="calculateExpenses()">
                <input type="number" placeholder="金額" class="member-price w-24 rounded-md border-gray-300 border p-2" oninput="calculateExpenses()">
                <button onclick="document.getElementById('row-${memberCount}').remove(); calculateExpenses();" class="text-red-500 font-bold px-1">❌</button>
            `;
            container.appendChild(row);
        }

        function calculateExpenses() {
            const discount = parseFloat(document.getElementById('discountFee').value) || 0;
            const delivery = parseFloat(document.getElementById('deliveryFee').value) || 0;
            const other = parseFloat(document.getElementById('otherFee').value) || 0;
            
            const totalExtraFee = delivery + other; 
            const rows = document.querySelectorAll('.member-row');
            let foodTotal = 0; let members = [];

            rows.forEach(row => {
                const name = row.querySelector('.member-name').value.trim();
                const price = parseFloat(row.querySelector('.member-price').value) || 0;
                if (name) { foodTotal += price; members.push({ name, price }); }
            });

            const resultsDiv = document.getElementById('calcResults');
            resultsDiv.innerHTML = '';
            calculatedData = [];
            let total = 0;

            members.forEach(m => {
                const shareRatio = foodTotal > 0 ? (m.price / foodTotal) : 0;
                const individualShareFee = (totalExtraFee * shareRatio); 
                const individualShareDiscount = (discount * shareRatio); 
                
                let finalPay = m.price + individualShareFee - individualShareDiscount;
                if (finalPay < 0) finalPay = 0;

                total += finalPay;
                
                calculatedData.push({ 
                    name: m.name, 
                    originalPrice: m.price.toFixed(1), 
                    shareFee: individualShareFee.toFixed(1), 
                    shareDiscount: individualShareDiscount.toFixed(1), 
                    finalPrice: finalPay.toFixed(1) 
                });
                
                resultsDiv.innerHTML += `
                    <div class="flex justify-between border-b border-gray-100 py-1 text-xs">
                        <span>${m.name} <span class="text-gray-400">(原價$${m.price} + 雜$${individualShareFee.toFixed(1)} - 扣$${individualShareDiscount.toFixed(1)})</span></span>
                        <span class="font-bold text-indigo-600">$${finalPay.toFixed(1)}</span>
                    </div>`;
            });
            document.getElementById('grandTotal').textContent = total.toFixed(1);
        }

        function triggerFinalConfirm() {
            const title = document.getElementById('mealTitle').value.trim() || "未命名食飯紀錄";
            if (calculatedData.length === 0) return alert('請先輸入成員與金額！');
            
            if (confirm(`【最後核對】\n項目：${title}\n總金額：$${document.getElementById('grandTotal').textContent}\n資料將傳送至 Google Sheet，狀態預設為 ❌ 未付。`)) {
                fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'addRecord', title: title, data: calculatedData })
                }).then(() => {
                    alert('✅ 紀錄成功寫入 Google Sheet！');
                    switchTab('history');
                    loadHistory();
                }).catch(err => alert('錯誤: ' + err));
            }
        }

        function loadHistory() {
            const listDiv = document.getElementById('historyList');
            listDiv.innerHTML = '<p class="text-center text-gray-500">正在從 Google Sheet 同步最新狀態...</p>';
            
            fetch(GAS_URL).then(res => res.json()).then(data => {
                if(data.length === 0) { listDiv.innerHTML = '<p class="text-center text-gray-500">暫無開支紀錄</p>'; return; }
                
                const groups = {};
                data.forEach(item => {
                    if(!groups[item.id]) groups[item.id] = { title: item.title, date: item.date, items: [] };
                    groups[item.id].items.push(item);
                });

                listDiv.innerHTML = '';
                Object.keys(groups).reverse().forEach(id => {
                    const group = groups[id];
                    let boxHTML = `<div class="bg-gray-50 p-4 rounded-lg border border-gray-200 mb-3">
                        <div class="flex justify-between text-xs font-bold text-gray-500 mb-2"><span>📅 ${group.date}</span><span>🏷️ ${group.title}</span></div>
                        <div class="space-y-2">`;
                    
                    group.items.forEach(person => {
                        const isPaid = person.status && person.status.includes('✅');
                        const statusBadge = isPaid ? 'bg-green-100 text-green-800 hover:bg-green-200' : 'bg-red-100 text-red-800 hover:bg-red-200';
                        
                        const orig = person.originalPrice ? parseFloat(person.originalPrice).toFixed(1) : '0.0';
                        const fee = person.shareFee ? parseFloat(person.shareFee).toFixed(1) : '0.0';
                        const disc = person.shareDiscount ? parseFloat(person.shareDiscount).toFixed(1) : '0.0';
                        const final = person.finalPrice ? parseFloat(person.finalPrice).toFixed(1) : '0.0';

                        // 💡 判斷是否需要顯示時間戳記 (只有已付，且後端有記錄時間時才顯示)
                        let timeLabelHTML = '';
                        if (isPaid && person.updateTime && person.updateTime !== '-') {
                            timeLabelHTML = `<div class="text-[9px] text-gray-400 text-right mt-0.5">(last update dtm: ${person.updateTime})</div>`;
                        }

                        boxHTML += `<div class="flex justify-between items-center text-xs border-b border-dashed border-gray-200 py-1">
                            <div class="flex flex-col md:flex-row md:gap-1">
                                <span class="font-semibold text-gray-800">${person.name}</span>
                                <span class="text-gray-400 text-[11px]">(原價$${orig} + 雜$${fee} - 扣$${disc})</span>
                            </div>
                            <div class="flex flex-col items-end gap-0.5">
                                <div class="flex items-center gap-3">
                                    <span class="font-bold text-indigo-600 text-sm">$${final}</span>
                                    <button onclick="toggleStatus('${id}', '${person.name}')" class="px-2 py-0.5 text-[10px] font-semibold rounded-full ${statusBadge} transition">${person.status || '❌ 未付'}</button>
                                </div>
                                ${timeLabelHTML}
                            </div>
                        </div>`;
                    });
                    boxHTML += `</div></div>`;
                    listDiv.innerHTML += boxHTML;
                });
            }).catch(err => {
                listDiv.innerHTML = `<p class="text-center text-red-500">載入失敗 (${err})</p>`;
            });
        }

        function toggleStatus(id, name) {
            const password = prompt(`欲更改【${name}】的付款狀態，請輸入管理員密碼：`);
            if (password === null) return;
            
            if (password === "0000") {
                fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'updateStatus', id: id, name: name })
                }).then(() => {
                    loadHistory(); 
                }).catch(err => alert('更新失敗: ' + err));
            } else {
                alert("❌ 密碼錯誤！無法更改狀態。");
            }
        }
    </script>
</body>
</html>
